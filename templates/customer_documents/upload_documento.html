{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>

                📄 Enviar Documento

            </h3>

        </div>

       

        <div class="card-body">

            {% include "customer_documents/components/menu_documentos.html" %}


            <hr>

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    class="btn btn-primary">

                    Enviar Documento

                </button>

                <a href="{% url 'customer_documents:dashboard_documentos' %}"
                class="btn btn-secondary">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
