{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>
                📄 Enviar Documento
            </h3>

        </div>

        <div class="card-body">

            {% include "customer_documents/components/menu_documentos.html" %}

            <hr>

            <form
                method="post"
                enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Descrição

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="descricao"
                        placeholder="Ex.: RG frente">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Tipo de Documento

                    </label>

                    <select
                        class="form-select"
                        name="tipo">

                        <option value="">Selecione</option>

                        <option>RG</option>

                        <option>CPF</option>

                        <option>CNH</option>

                        <option>Comprovante de Residência</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Arquivo

                    </label>

                    <input
                        type="file"
                        class="form-control"
                        name="arquivo">

                    <div class="form-text">

                        Permitido: JPG, PNG ou PDF.

                    </div>

                </div>

                <div class="form-check mb-4">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="aceite">

                    <label class="form-check-label">

                        Declaro que o documento enviado é verdadeiro.

                    </label>

                </div>

                <button
                    class="btn btn-success">

                    Enviar Documento

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
