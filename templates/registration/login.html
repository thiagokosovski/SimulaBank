{% extends "base_publica.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="card shadow">

    <!-- Cabeçalho -->
    <div class="card-header bg-primary text-white text-center">

        <h3 class="mb-0">
            Entrar
        </h3>

    </div>

    <!-- Corpo -->
    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            <!-- Usuário -->
            <div class="mb-3">

                <label class="form-label">

                    Usuário

                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Digite seu usuário"
                    required>

            </div>

            <!-- Senha -->
            <div class="mb-4">

                <label class="form-label">

                    Senha

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Digite sua senha"
                    required>

            </div>

            <!-- Botão -->
            <button
                type="submit"
                class="btn btn-primary w-100">

                Entrar

            </button>

        </form>

    </div>

    <!-- Rodapé -->
    <div class="card-footer text-center">

        <p class="text-muted mb-3">

            Ainda não possui uma conta?

        </p>

        <a
            href="{% url 'cadastro_cliente' %}"
            class="btn btn-outline-success w-100">

            Criar Conta

        </a>

    </div>

</div>

{% endblock %}
